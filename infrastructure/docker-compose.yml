services:
  # === Reverse Proxy ===
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    restart: unless-stopped
    networks:
      - tprm-network

  # === React Frontend ===
  web:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.web
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - tprm-network

  # === Fastify API ===
  api:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.api
    expose:
      - "3000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://tprm:tprm_password@postgres:5432/tprm?schema=public
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - tprm-network

  # === BullMQ Workers ===
  worker:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.api
    command: ["node", "dist/jobs/worker-entry.js"]
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://tprm:tprm_password@postgres:5432/tprm?schema=public
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tprm-network

  # === PostgreSQL 16 ===
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tprm
      POSTGRES_USER: tprm
      POSTGRES_PASSWORD: tprm_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tprm -d tprm"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tprm-network

  # === Redis 7 ===
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tprm-network

  # === MinIO (S3-compatible storage) ===
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tprm-network

  # === MinIO bucket initialization ===
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set tprm http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing tprm/tprm-artifacts;
      mc mb --ignore-existing tprm/tprm-reports;
      echo 'Buckets created successfully';
      "
    networks:
      - tprm-network

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  tprm-network:
    driver: bridge
